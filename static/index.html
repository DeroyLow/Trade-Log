<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trading Results Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Equity Trading Journal</p>
          <h1>Deroy 2026 Trading Results</h1>
          <p class="hero-copy">
            SilverCape Investments
          </p>
        </div>
      </header>

      <main class="content-grid">
        <section class="panel summary-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Overview</p>
              <h2>Year-to-Date Snapshot</h2>
            </div>
          </div>
          <div class="stat-grid" id="summary-cards"></div>
        </section>

        <section class="panel chart-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Performance</p>
              <h2>Monthly Returns</h2>
            </div>
            <button id="clear-month" class="ghost-button" hidden>Show all months</button>
          </div>
          <div class="chart-card">
            <div id="month-chart" class="chart" aria-label="Monthly returns chart"></div>
            <div id="chart-tooltip" class="chart-tooltip" hidden></div>
          </div>
        </section>

        <section class="panel trades-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Journal</p>
              <h2>Closed Trades</h2>
            </div>
            <div class="filters">
              <select id="month-filter">
                <option value="">All months</option>
              </select>
              <select id="setup-filter">
                <option value="">All setups</option>
              </select>
              <select id="side-filter">
                <option value="">Long and short</option>
              </select>
              <input id="search-filter" type="search" placeholder="Search ticker, setup, notes">
            </div>
          </div>

          <div class="table-meta">
            <strong id="trade-count">0 trades</strong>
            <span id="selection-caption">Showing all trades</span>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Exit</th>
                  <th>Ticker</th>
                  <th>Side</th>
                  <th>Setup</th>
                  <th>Entry Date</th>
                  <th>Entry Px</th>
                  <th>Exit Px</th>
                  <th>Net P&amp;L</th>
                  <th>Port. Return</th>
                  <th>Hold</th>
                  <th>Notes</th>
                </tr>
              </thead>
              <tbody id="trade-rows"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="/static/app.js"></script>
  </body>
  </html>
